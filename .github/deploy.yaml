# .github/workflows/deploy.yml
name: Build and Deploy React App

on:
  push:
    branches:
      - main
    paths:
      - 'hotel-booking-ui/**'   # only trigger when client code changes

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Node.js Setup ───────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # ─── Build ───────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build React app
        working-directory: client
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      # ─── Upload to S3 ────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Upload build to S3
        run: |
          tar -czf react-build.tar.gz -C client/build .
          aws s3 cp react-build.tar.gz s3://my-terraform-state-bucket-aruna451/react-build.tar.gz

      # ─── Deploy to EC2 via SSM ───────────────────────────────────
      - name: Deploy to EC2 instances
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=ec2-react-app-deployment" \
              "Name=tag:Environment,Values=dev" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)

          echo "Deploying to instances: $INSTANCE_IDS"

          aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws s3 cp s3://my-terraform-state-bucket-aruna451/react-build.tar.gz /tmp/react-build.tar.gz",
              "rm -rf /usr/share/nginx/html/*",
              "tar -xzf /tmp/react-build.tar.gz -C /usr/share/nginx/html",
              "systemctl restart nginx",
              "echo Deploy complete"
            ]' \
            --output text

      # ─── Verify ──────────────────────────────────────────────────
      - name: Verify deployment
        run: |
          echo "Deployed successfully!"
          echo "App URL: http://${{ secrets.ALB_DNS_NAME }}"